runtime: nodejs22
service: default
instance_class: F2
entrypoint: npm run start
env: standard

automatic_scaling:
  min_instances: 0   # pay only when there’s traffic
  max_instances: 2
  target_cpu_utilization: 0.65

service_account: nextjs-app-sa@neural-land-469712-t7.iam.gserviceaccount.com

env_variables:
  # Reference secrets from Secret Manager
  CLERK_SECRET_KEY: "projects/neural-land-469712-t7/secrets/CLERK_SECRET_KEY/versions/latest"
  MONGODB_URI: "projects/neural-land-469712-t7/secrets/MONGODB_URI/versions/latest"
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "projects/neural-land-469712-t7/secrets/NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY/versions/latest"
  OPENROUTER_API_KEY: "projects/neural-land-469712-t7/secrets/OPENROUTER_API_KEY/versions/latest"
