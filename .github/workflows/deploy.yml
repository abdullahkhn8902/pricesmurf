name: CI/CD — Build and Deploy to App Engine

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # No need to export secrets here for the build, they are handled by Cloud Build
      # If you want to run local build tests before submit, you can export GitHub secrets here

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: neural-land-469712-t7
          export_default_credentials: true

      - name: Submit Cloud Build (build + deploy)
        run: |
          gcloud builds submit --config cloudbuild.yaml --project=neural-land-469712-t7 .
