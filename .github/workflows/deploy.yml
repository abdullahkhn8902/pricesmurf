name: CI/CD — Deploy to Cloud Run

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Authenticate to GCP via OIDC
        uses: google-github-actions/auth@v1
        with:
          token_format: access_token
          workload_identity_provider: projects/641189217314/locations/global/workloadIdentityPools/gha-pool/providers/github-provider
          service_account: gha-deployer@neural-land-469712-t7.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: neural-land-469712-t7
          export_default_credentials: true
        env:
          CLOUDSDK_CONTAINER_USE_ARTIFACT_REGISTRY: true

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy pricesmurf \
            --source . \
            --region us-central1 \
            --allow-unauthenticated
