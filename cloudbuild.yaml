timeout: "1200s"

steps:
- name: 'node:22-bullseye'
  id: build
  entrypoint: 'bash'
  secretEnv:
    - _NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
    - _CLERK_SECRET_KEY
    - _MONGODB_URI
    - _OPENROUTER_API_KEY
  args:
    - '-c'
    - |
      # Export secrets into shell so Next.js build can see them
      # Use $$ to escape $ so Cloud Build doesn't treat these as template substitutions.
      export NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$$_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
      export CLERK_SECRET_KEY=$$_CLERK_SECRET_KEY
      export MONGODB_URI=$$_MONGODB_URI
      export OPENROUTER_API_KEY=$$_OPENROUTER_API_KEY

      npm ci
      npm run build

- name: 'gcr.io/cloud-builders/gcloud'
  id: deploy
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      gcloud app deploy app.yaml --project=neural-land-469712-t7 --quiet

availableSecrets:
  secretManager:
    - versionName: "projects/neural-land-469712-t7/secrets/NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY/versions/latest"
      env: "_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
    - versionName: "projects/neural-land-469712-t7/secrets/CLERK_SECRET_KEY/versions/latest"
      env: "_CLERK_SECRET_KEY"
    - versionName: "projects/neural-land-469712-t7/secrets/MONGODB_URI/versions/latest"
      env: "_MONGODB_URI"
    - versionName: "projects/neural-land-469712-t7/secrets/OPENROUTER_API_KEY/versions/latest"
      env: "_OPENROUTER_API_KEY"
