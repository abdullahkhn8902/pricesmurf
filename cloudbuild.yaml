steps:
# Fetch secrets from Secret Manager
- name: gcr.io/cloud-builders/gcloud
  id: fetch-secrets
  entrypoint: bash
  args:
    - -c
    - |
      echo "Fetching secrets..."
      export NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY --project=$PROJECT_ID)
      export CLERK_SECRET_KEY=$(gcloud secrets versions access latest --secret=CLERK_SECRET_KEY --project=$PROJECT_ID)
      export MONGODB_URI=$(gcloud secrets versions access latest --secret=MONGODB_URI --project=$PROJECT_ID)
      export OPENROUTER_API_KEY=$(gcloud secrets versions access latest --secret=OPENROUTER_API_KEY --project=$PROJECT_ID)

# Build with secrets injected
- name: node:22-bullseye
  id: build
  entrypoint: bash
  args:
    - -c
    - |
      echo "Installing dependencies..."
      npm ci
      echo "Building Next.js..."
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY \
      CLERK_SECRET_KEY=$CLERK_SECRET_KEY \
      MONGODB_URI=$MONGODB_URI \
      OPENROUTER_API_KEY=$OPENROUTER_API_KEY \
      npm run build

# Deploy to App Engine
- name: gcr.io/cloud-builders/gcloud
  id: deploy
  entrypoint: bash
  args:
    - -c
    - gcloud app deploy app.yaml --project=$PROJECT_ID --quiet
