steps:
# Fetch secrets
- name: gcr.io/cloud-builders/gcloud
  id: fetch-secrets
  entrypoint: bash
  args:
    - -c
    - |
      set -e
      echo "Fetching secrets from Secret Manager..."
      export NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY)
      export CLERK_SECRET_KEY=$(gcloud secrets versions access latest --secret=CLERK_SECRET_KEY)
      export MONGODB_URI=$(gcloud secrets versions access latest --secret=MONGODB_URI)
      export OPENROUTER_API_KEY=$(gcloud secrets versions access latest --secret=OPENROUTER_API_KEY)
      echo "Secrets fetched"
# Build
- name: node:22-bullseye
  id: build
  entrypoint: bash
  args:
    - -c
    - |
      set -e
      npm ci
      npm run build
# Deploy
- name: gcr.io/cloud-builders/gcloud
  id: deploy
  entrypoint: bash
  args:
    - -c
    - gcloud app deploy app.yaml --project=$PROJECT_ID --quiet
