steps:
  # Install dependencies
  - name: "gcr.io/cloud-builders/npm"
    dir: "frontend"
    args: ["install"]

  # Build Next.js app
  - name: "gcr.io/cloud-builders/npm"
    dir: "frontend"
    args: ["run", "build"]

  # Deploy to Cloud Run (using Buildpacks, no Dockerfile needed)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pricesmurf-frontend
      - --source=./frontend
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated

timeout: "1200s"
